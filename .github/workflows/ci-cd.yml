name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Always run: Test, lint, and build Python package
  test-and-build:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    outputs:
      is-release: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}

    - name: Run linting and formatting checks
      run: |
        uv run ruff format --check .
        uv run ruff check .

    - name: Test with pytest
      run: uv run pytest --cov=meetcap tests --cov-report=xml --cov-fail-under=73

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    # Only build package artifacts once (Python 3.11)
    - name: Build package
      if: matrix.python-version == '3.11'
      run: uv build

    - name: Check package metadata
      if: matrix.python-version == '3.11'
      run: uvx twine check dist/*

    - name: Upload build artifacts
      if: matrix.python-version == '3.11'
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 7

  # Only on version tags: Publish to PyPI and create GitHub release
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test-and-build
    permissions:
      contents: write
      id-token: write  # For PyPI trusted publishing

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

    - name: Output release details
      run: |
        echo "🎉 Release ${{ github.ref_name }} published successfully!"
        echo "📦 PyPI: https://pypi.org/project/meetcap/${{ github.ref_name }}/"
        echo "📋 GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
